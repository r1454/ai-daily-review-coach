# AI每日复盘教练 — 配置示例
# 复制此文件并根据需要修改

# ── API 配置 ──
# DeepSeek API（推荐，学生免费额度：https://platform.deepseek.com）
deepseek_api_key: "sk-your-key-here"
deepseek_base_url: "https://api.deepseek.com"

# OpenAI 兼容接口（备选）
openai_api_key: ""        # 如果不用 DeepSeek，填这个
openai_base_url: ""       # 自定义 API 地址（如本地 Ollama）

# ── 模型选择 ──
model: "deepseek-chat"    # 推荐配置，性价比最高
# 其他可选：
# model: "deepseek-reasoner"  # 深度思考模式
# model: "gpt-4o-mini"        # OpenAI 轻量模型
# model: "qwen-turbo"         # 通义千问

# ── 存储配置 ──
review_dir: "~/.daily-reviews"  # 复盘记录存储目录

# ── 环境变量设置方式 ──
# Linux / macOS:
#   export DEEPSEEK_API_KEY="sk-your-key"
#   export REVIEW_DIR="$HOME/my-reviews"
#
# Windows (PowerShell):
#   $env:DEEPSEEK_API_KEY="sk-your-key"
#   $env:REVIEW_DIR="C:\my-reviews"
#
# Windows (Git Bash):
#   export DEEPSEEK_API_KEY="sk-your-key"
#   export REVIEW_DIR="/c/Users/你的用户名/my-reviews"
